<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>生成今日花朵 - 花园回响 EchoBloom</title>
    <link rel="stylesheet" href="src/main.css">
  </head>
  <body>
    <main class="bloom-workspace flower-workspace" aria-label="今日花朵生成结果">
      <section class="flower-hero-stage" aria-label="3D 花朵模型">
        <div id="flower-model-canvas" class="flower-model-canvas" aria-label="3D 花朵画布"></div>
        <div id="flower-model-status" class="flower-status-pill">加载模型中...</div>
      </section>

      <section class="flower-generate-page glass-panel">
        <div class="flower-generate-left">
          <header class="flower-generate-intro">
            <a class="soft-back-link" href="index.html">返回首页</a>
            <h1>今日花朵</h1>
            <p>把一段故事压成花的形状，再轻轻放进花园里。</p>
          </header>

          <div class="flower-generate-summary">
            <section aria-labelledby="generated-flower-name">
              <h2 id="generated-flower-name">今日花名</h2>
              <p>慢慢打开</p>
            </section>

            <section aria-labelledby="generated-flower-date">
              <h2 id="generated-flower-date">生成日期</h2>
              <p>2026.06.15</p>
            </section>

            <section aria-labelledby="generated-flower-language">
              <h2 id="generated-flower-language">今日花语</h2>
              <p>不是所有完成都会轻松，但它依然算数。</p>
            </section>
          </div>
        </div>

        <section class="flower-generate-panel" aria-label="生成结果">
          <div class="flower-generate-details">
            <section aria-labelledby="generated-flower-stats">
              <h2 id="generated-flower-stats">花朵特征</h2>
              <ul id="generated-stats" class="flower-stats"></ul>
            </section>
          </div>

          <div class="flower-action-stack" aria-label="今日花朵操作">
            <button type="button" data-action="put-into-garden">放入花园</button>
            <a href="models/meigui.glb" download="echobloom-flower.glb">下载模型</a>
          </div>
        </section>
      </section>
    </main>

    <script type="module" src="src/page-audio.js"></script>
    <script type="module" src="src/flower-store.js"></script>
    <script type="module" src="src/flower-data.js"></script>
    <script type="module" src="src/flower.js"></script>
    <script type="module" src="src/flower-viewer.js"></script>
  </body>
</html>
